<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rishi Narendran | Terminal</title>
    <meta
      name="description"
      content="Rishi Narendran — terminal portfolio. Type help for commands."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="terminal" role="main">
      <section
        id="output"
        class="terminal__output"
        aria-live="polite"
        aria-atomic="false"
      >
        <div class="terminal__input-line" id="input-line"><span
            class="terminal__prompt"
            id="prompt"
            >C:\Users\guest&gt;</span
          ><span
            id="command-input"
            class="terminal__input"
            contenteditable="true"
            role="textbox"
            spellcheck="false"
            autocapitalize="none"
            autocorrect="off"
            aria-label="Terminal command input"
          ></span><span class="terminal__caret" aria-hidden="true"></span></div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
