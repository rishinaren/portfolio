<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rishi Code</title>
    <meta
      name="description"
      content="Rishi Narendran — Rishi Code terminal. Type help for commands, /art for terminal art, /game to play."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen" id="screen" role="main">
      <div class="scrollback" id="scrollback" aria-live="polite" aria-atomic="false"></div>
      <div class="prompt-line" id="input-line">
        <span class="prompt" id="prompt">&gt;</span><span
          id="cmd"
          class="cmd"
          contenteditable="true"
          role="textbox"
          spellcheck="false"
          autocapitalize="none"
          autocorrect="off"
          aria-label="Terminal command input"
        ></span><span class="caret" aria-hidden="true"></span>
      </div>
    </main>
    <script src="script.js"></script>
    <script src="art.js"></script>
    <script src="games.js"></script>
  </body>
</html>
